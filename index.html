  <section class="about-panel" id="about" aria-hidden="true">
    <p>Malibu Meadows is a small regenerative microfarm perched where the Santa Monica Mountains meet the Pacific. We grow seasonal vegetables, herbs, and cut flowers for our neighbors, local kitchens, and the community table.</p>
  </section>
